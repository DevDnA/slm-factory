<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>slm-factory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<link id="hljsTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   Design tokens — OpenWebUI / opencode-ai inspired
   ═══════════════════════════════════════════════════════════════ */
:root,
[data-theme="dark"] {
  --bg: #0d0f14;
  --bg-elev: #141820;
  --bg-elev-2: #1a1f29;
  --bg-hover: rgba(255,255,255,0.04);
  --bg-active: rgba(255,255,255,0.08);
  --bg-user: #1e2430;
  --bg-input: #141820;
  --bg-code: #0a0d13;
  --bg-drawer: rgba(13,15,20,0.96);

  --fg: #ececf1;
  --fg-soft: #b4bcd0;
  --fg-muted: #8a93a8;
  --fg-subtle: #5a6277;

  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-soft: rgba(99,102,241,0.15);
  --accent-glow: rgba(99,102,241,0.4);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;

  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --bg: #fafafa;
  --bg-elev: #ffffff;
  --bg-elev-2: #f4f4f7;
  --bg-hover: rgba(0,0,0,0.04);
  --bg-active: rgba(0,0,0,0.08);
  --bg-user: #eef2ff;
  --bg-input: #ffffff;
  --bg-code: #f8f9fc;
  --bg-drawer: rgba(255,255,255,0.98);

  --fg: #1a1a1a;
  --fg-soft: #3f3f47;
  --fg-muted: #71717a;
  --fg-subtle: #a1a1aa;

  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-soft: rgba(99,102,241,0.1);
  --accent-glow: rgba(99,102,241,0.25);
  --success: #059669;
  --warning: #d97706;
  --danger: #dc2626;

  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
}

:root {
  --font-sans: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --sidebar-w: 280px;
  --topbar-h: 56px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════════════════════════ Reset ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; color: inherit; cursor: pointer; background: none; border: none; }
input, textarea, select { font-family: inherit; color: inherit; }

/* ═══════════════════════════════════════════════════════════════ Scrollbars ═══════════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: transparent; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
*:hover > ::-webkit-scrollbar-thumb, *:hover::-webkit-scrollbar-thumb { background: var(--border-strong); background-clip: padding-box; }

/* ═══════════════════════════════════════════════════════════════ Layout ═══════════════════════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: 100vh;
  grid-template-rows: 100dvh;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  transition: grid-template-columns 240ms var(--ease);
}
.app.sidebar-collapsed { grid-template-columns: 0 1fr; }

/* ═══════════════════════════════════════════════════════════════ Sidebar ═══════════════════════════════════════════════════════════════ */
.sidebar {
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
  height: 100%;
  transition: transform 240ms var(--ease);
}
.app.sidebar-collapsed .sidebar { transform: translateX(-100%); }

.sidebar-header {
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  flex: 1;
  min-width: 0;
}
.brand-logo {
  width: 28px; height: 28px;
  flex-shrink: 0;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 12px;
  letter-spacing: -0.5px;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.brand-name {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-muted);
  transition: all 150ms var(--ease);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--fg); }
.icon-btn:active { background: var(--bg-active); }
.icon-btn svg { width: 18px; height: 18px; }

.sidebar-new {
  margin: 0 12px 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: var(--bg-elev-2);
  display: flex; align-items: center; gap: 10px;
  color: var(--fg);
  font-size: 13px; font-weight: 500;
  transition: all 150ms var(--ease);
}
.sidebar-new:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.sidebar-new svg { width: 16px; height: 16px; }

.sidebar-search {
  margin: 0 12px 8px;
  position: relative;
}
.sidebar-search input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border-radius: 8px;
  background: var(--bg-elev-2);
  border: 1px solid transparent;
  color: var(--fg);
  font-size: 12.5px;
  outline: none;
  transition: border-color 150ms var(--ease);
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--fg-subtle); }
.sidebar-search svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--fg-muted);
  pointer-events: none;
}

.sidebar-chats {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.chat-group-label {
  padding: 10px 8px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  color: var(--fg-soft);
  font-size: 13px;
  cursor: pointer;
  transition: background 120ms var(--ease);
  position: relative;
  min-width: 0;
}
.chat-item:hover { background: var(--bg-hover); }
.chat-item.active { background: var(--bg-active); color: var(--fg); }
.chat-item-title {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.chat-item-delete {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--fg-muted);
  flex-shrink: 0;
}
.chat-item:hover .chat-item-delete { display: inline-flex; }
.chat-item-delete:hover { background: var(--bg-active); color: var(--danger); }
.chat-item-delete svg { width: 13px; height: 13px; }
.chat-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--fg-subtle);
  font-size: 12.5px;
}

.sidebar-footer {
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.status-indicator {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--fg-muted);
  min-width: 0;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  box-shadow: 0 0 8px var(--success);
  animation: pulse 2s ease-in-out infinite;
}
.status-dot.disconnected {
  background: var(--danger);
  box-shadow: 0 0 8px var(--danger);
  animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* ═══════════════════════════════════════════════════════════════ Main area ═══════════════════════════════════════════════════════════════ */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  height: 100%;
  overflow: hidden;
  position: relative;
}
.topbar {
  height: var(--topbar-h);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 5;
  flex-shrink: 0;
}

/* Model selector */
.model-select {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
  transition: all 150ms var(--ease);
  position: relative;
  cursor: pointer;
}
.model-select:hover { border-color: var(--border-strong); background: var(--bg-elev-2); }
.model-select .chev {
  width: 14px; height: 14px;
  color: var(--fg-muted);
  transition: transform 150ms var(--ease);
}
.model-select.open .chev { transform: rotate(180deg); }
.model-select .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.model-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-4px);
  transition: opacity 150ms var(--ease), transform 150ms var(--ease);
}
.model-menu.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
.model-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 120ms var(--ease);
}
.model-item:hover { background: var(--bg-hover); }
.model-item-top {
  display: flex;
  align-items: center;
  gap: 8px;
}
.model-item-name { font-weight: 600; font-size: 13px; color: var(--fg); }
.model-item-desc { font-size: 12px; color: var(--fg-muted); line-height: 1.5; }
.model-item.active { background: var(--accent-soft); }
.model-item.active .model-item-name { color: var(--accent); }
.model-item .check { width: 14px; height: 14px; color: var(--accent); margin-left: auto; opacity: 0; }
.model-item.active .check { opacity: 1; }

.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 4px; }

/* Status phase — streaming 단계 라이브 표시 (opencode TUI 스타일) */
.status-phase {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  opacity: 0;
  transform: translateX(6px);
  transition: opacity 180ms var(--ease), transform 180ms var(--ease);
  pointer-events: none;
  max-width: 240px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status-phase.visible {
  opacity: 1;
  transform: translateX(0);
}
.status-phase::before {
  content: '●';
  color: var(--accent);
  font-size: 10px;
  animation: pulse 1.4s ease-in-out infinite;
}

/* ═══════════════════════════════════════════════════════════════ Messages ═══════════════════════════════════════════════════════════════ */
.messages {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0 16px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.messages-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 32px;
  text-align: center;
  gap: 16px;
}
.empty-logo {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px var(--accent-glow);
  color: white;
  font-size: 24px;
  font-weight: 700;
}
.empty-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.empty-subtitle {
  font-size: 14px;
  color: var(--fg-muted);
  max-width: 420px;
  line-height: 1.6;
}
.suggestions {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 560px;
}
.suggestion-card {
  text-align: left;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  font-size: 13px;
  color: var(--fg-soft);
  transition: all 150ms var(--ease);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.suggestion-card:hover {
  border-color: var(--accent);
  background: var(--bg-elev-2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.suggestion-card b { font-weight: 600; color: var(--fg); font-size: 13px; }
.suggestion-card span { color: var(--fg-muted); font-size: 12px; }

/* ═══════════════════════════════════════════════════════════════ Message bubbles — OpenWebUI style ═══════════════════════════════════════════════════════════════ */
.message {
  display: flex;
  gap: 14px;
  padding: 16px 4px;
  animation: msg-in 260ms var(--ease-out);
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.avatar {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
  font-size: 0;
  line-height: 0;
}
.message.user .avatar { background: var(--fg-muted); }
.message.ai .avatar {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}
.message { gap: 10px; }
.message-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-muted);
}
.message-role { font-weight: 600; color: var(--fg); font-size: 13px; }
.route-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--fg-subtle);
  letter-spacing: 0;
  text-transform: lowercase;
  background: transparent;
  border-radius: 0;
}
.route-badge::before {
  content: '·';
  margin-right: 2px;
  color: var(--fg-subtle);
}
.route-badge.simple { color: var(--fg-muted); }
.route-badge.agent { color: var(--accent); }

.message-content {
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--fg);
  word-break: break-word;
}
.message.user .message-content {
  background: transparent;
  border: none;
  border-left: 2px solid var(--accent);
  border-radius: 0;
  padding: 2px 0 2px 12px;
  white-space: pre-wrap;
  color: var(--fg-soft);
}

/* 재시도 사이클 시 contentEl을 부드럽게 페이드 → 비움 */
.message-content {
  transition: opacity 180ms var(--ease);
}
.message-content.retrying {
  opacity: 0;
}
.message-content > *:first-child { margin-top: 0 !important; }
.message-content > *:last-child { margin-bottom: 0 !important; }
.message-content h1, .message-content h2, .message-content h3, .message-content h4 {
  font-weight: 600;
  margin: 20px 0 8px;
  line-height: 1.35;
  letter-spacing: -0.2px;
}
.message-content h1 { font-size: 1.5em; }
.message-content h2 { font-size: 1.3em; }
.message-content h3 { font-size: 1.12em; }
.message-content h4 { font-size: 1em; color: var(--fg-soft); }
.message-content p { margin: 0 0 10px; }
.message-content strong { font-weight: 600; }
.message-content em { font-style: italic; color: var(--fg-soft); }
.message-content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 120ms var(--ease); }
.message-content a:hover { border-bottom-color: var(--accent); }
.message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
.message-content li { margin-bottom: 4px; }
.message-content li::marker { color: var(--fg-muted); }
.message-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.message-content blockquote {
  margin: 10px 0;
  padding: 6px 14px;
  border-left: 3px solid var(--accent);
  background: var(--accent-soft);
  border-radius: 0 8px 8px 0;
  color: var(--fg-soft);
}
.message-content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  padding: 1px 6px;
  border-radius: 5px;
  background: var(--bg-elev-2);
  color: var(--accent-hover);
  border: 1px solid var(--border);
}
.message-content pre {
  position: relative;
  margin: 12px 0;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-code);
  overflow: hidden;
}
.message-content pre code {
  display: block;
  padding: 14px 16px;
  background: none;
  border: none;
  color: var(--fg);
  font-size: 13px;
  line-height: 1.6;
  overflow-x: auto;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.code-copy {
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-sans);
  text-transform: none;
  letter-spacing: 0;
  transition: all 120ms var(--ease);
}
.code-copy:hover { background: var(--bg-hover); color: var(--fg); }
.code-copy.copied { color: var(--success); }
.message-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.message-content thead th {
  background: var(--bg-elev-2);
  color: var(--fg);
  font-weight: 600;
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.message-content tbody td {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  color: var(--fg-soft);
}
.message-content tbody tr:nth-child(even) { background: var(--bg-hover); }

.mermaid-container {
  margin: 12px 0;
  padding: 14px;
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
  text-align: center;
}
.mermaid-container svg { max-width: 100%; height: auto; }

/* Message actions */
.message-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  opacity: 0;
  transition: opacity 150ms var(--ease);
  margin-top: 2px;
}
.message.ai:hover .message-actions, .message-actions.force-visible { opacity: 1; }
.action-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-muted);
  transition: all 120ms var(--ease);
}
.action-btn:hover { background: var(--bg-hover); color: var(--fg); }
.action-btn.success { color: var(--success); }
.action-btn svg { width: 15px; height: 15px; }

/* Typing cursor */
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  margin-left: 2px;
  background: var(--accent);
  border-radius: 1px;
  vertical-align: text-bottom;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Thinking indicator */
.thinking {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  font-size: 12.5px;
  color: var(--fg-muted);
}
.thinking-dots { display: inline-flex; gap: 3px; }
.thinking-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--fg-muted);
  animation: bounce 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Reasoning panel — opencode TUI 스타일 (얇은 좌측 바 + 요약 1줄) */
.reasoning {
  border: none;
  border-left: 2px solid var(--border-strong);
  border-radius: 0;
  background: transparent;
  padding-left: 10px;
  margin: 2px 0;
  transition: border-color 200ms var(--ease);
}
.reasoning.live { border-left-color: var(--accent); }
.reasoning-toggle {
  width: 100%;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--fg-muted);
  text-align: left;
  font-family: var(--font-mono);
}
.reasoning-toggle:hover { color: var(--fg-soft); }
.reasoning-toggle::before {
  content: '✻';
  display: inline-block;
  font-size: 13px;
  color: var(--fg-muted);
  transition: color 200ms var(--ease);
}
.reasoning.live .reasoning-toggle::before {
  color: var(--accent);
  animation: spin 2.4s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.reasoning-toggle .chev {
  width: 12px; height: 12px;
  transition: transform 150ms var(--ease);
  color: var(--fg-subtle);
  margin-left: auto;
}
.reasoning-toggle.open .chev { transform: rotate(90deg); }
.reasoning-toggle b {
  font-weight: 500;
  color: var(--fg-soft);
  font-family: var(--font-sans);
}
.reasoning.live .reasoning-toggle b { color: var(--accent); font-weight: 600; }
.reasoning .live-dots { display: none; }

.reasoning-body {
  display: none;
  padding: 4px 0 8px;
  max-height: 360px;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.reasoning-body.open { display: block; }

/* opencode 스타일 — 태그·아이콘 없이 흐르는 dimmed prose */
.reasoning-prose {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-sans);
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--fg-subtle);
  font-style: italic;
  opacity: 0.92;
}
.reasoning.live .reasoning-prose { opacity: 1; }
.reasoning.live .reasoning-prose::after {
  content: '';
  display: inline-block;
  width: 1px; height: 0.95em;
  margin-left: 2px;
  background: var(--accent);
  vertical-align: text-bottom;
  animation: blink 1s steps(2) infinite;
}

/* Sources */
.sources {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-elev);
}
.sources-toggle {
  width: 100%;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--fg-soft);
  text-align: left;
  transition: background 120ms var(--ease);
}
.sources-toggle:hover { background: var(--bg-hover); }
.sources-toggle .chev {
  width: 14px; height: 14px;
  transition: transform 150ms var(--ease);
  color: var(--fg-muted);
  margin-left: auto;
}
.sources-toggle.open .chev { transform: rotate(180deg); }
.sources-count {
  padding: 1px 7px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
}
.sources-body {
  display: none;
  padding: 4px 8px 8px;
  border-top: 1px solid var(--border);
}
.sources-body.open { display: block; }
.source-item {
  padding: 10px 12px;
  border-radius: 8px;
  margin-top: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  transition: background 120ms var(--ease);
}
.source-item:hover { background: var(--bg-elev-2); }
.source-item-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.source-doc-id {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--accent);
  font-weight: 600;
}
.source-score {
  font-size: 11px;
  color: var(--fg-muted);
}
.source-text {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--fg-soft);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════ Composer ═══════════════════════════════════════════════════════════════ */
.composer-wrap {
  padding: 8px 24px 20px;
  flex-shrink: 0;
  background: linear-gradient(to top, var(--bg), transparent);
}
.composer {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 8px 8px 8px 16px;
  transition: border-color 150ms var(--ease), box-shadow 150ms var(--ease);
  position: relative;
}
.composer:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.composer textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: inherit;
  font-size: 14.5px;
  line-height: 1.5;
  resize: none;
  max-height: 200px;
  min-height: 24px;
  padding: 8px 0;
}
.composer textarea::placeholder { color: var(--fg-subtle); }
.send-btn {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 150ms var(--ease);
}
.send-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: scale(1.04);
  box-shadow: 0 4px 14px var(--accent-glow);
}
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.send-btn.stop { background: var(--danger); }
.send-btn.stop:hover { background: #f87171; box-shadow: 0 4px 14px rgba(239,68,68,0.4); }
.send-btn svg { width: 18px; height: 18px; }

.composer-hint {
  max-width: 820px;
  margin: 6px auto 0;
  text-align: center;
  font-size: 11px;
  color: var(--fg-subtle);
}
.composer-hint kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--fg-muted);
}

/* ═══════════════════════════════════════════════════════════════ Settings drawer ═══════════════════════════════════════════════════════════════ */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms var(--ease);
  z-index: 90;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(360px, 92vw);
  background: var(--bg-drawer);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  padding: 20px;
  transform: translateX(100%);
  transition: transform 260ms var(--ease);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-title { font-size: 16px; font-weight: 600; }

.setting-group { display: flex; flex-direction: column; gap: 10px; }
.setting-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  gap: 12px;
}
.setting-row-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.setting-row-title { font-size: 13.5px; font-weight: 500; color: var(--fg); }
.setting-row-desc { font-size: 12px; color: var(--fg-muted); line-height: 1.4; }

/* Toggle switch */
.toggle {
  width: 36px; height: 22px;
  border-radius: 999px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border-strong);
  position: relative;
  transition: background 180ms var(--ease);
  flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--fg-muted);
  transition: transform 180ms var(--ease), background 180ms var(--ease);
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle.on::after { transform: translateX(14px); background: white; }

.danger-btn {
  padding: 10px 14px;
  border-radius: var(--radius);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--danger);
  font-size: 13px;
  font-weight: 500;
  transition: all 150ms var(--ease);
}
.danger-btn:hover { background: rgba(239,68,68,0.08); border-color: var(--danger); }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all 220ms var(--ease);
  z-index: 1000;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.success { border-color: var(--success); color: var(--success); }

/* ═══════════════════════════════════════════════════════════════ Mobile ═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .app { grid-template-columns: 0 1fr; }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 280px;
    z-index: 80;
    transform: translateX(-100%);
  }
  .app.sidebar-open .sidebar { transform: translateX(0); }
  .app.sidebar-collapsed .sidebar { transform: translateX(-100%); }
  .app.sidebar-open::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 70;
  }
  .suggestions { grid-template-columns: 1fr; }
  .messages-inner { padding: 0 16px; }
  .composer-wrap { padding: 8px 16px 16px; }
  .composer-hint { display: none; }
}

/* ═══════════════════════════════════════════════════════════════ Utility ═══════════════════════════════════════════════════════════════ */
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>

  <!-- ═══════ Sidebar ═══════ -->

    <div class="sidebar-header">

      </button>
    </div>
  </aside>

  <!-- ═══════ Main ═══════ -->
  <section class="main">
    <header class="topbar">
      <button class="icon-btn" id="showSidebar" title="사이드바 열기" aria-label="사이드바 열기">

      </button>

        </button>

    </header>

    <main class="messages" id="messagesArea">
      <div class="messages-inner" id="messagesInner">
        <!-- 동적으로 채워짐 -->
      </div>
    </main>

    <div class="composer-wrap">
      <form class="composer" id="composer" autocomplete="off">
        <textarea
          id="inputField"
          rows="1"
          placeholder="질문을 입력하세요..."

        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="전송">
          <svg id="sendIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
          <svg id="stopIcon" class="hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>

      <div class="composer-hint">
        <kbd>Enter</kbd> 전송 · <kbd>Shift + Enter</kbd> 줄바꿈 · <kbd>⌘K</kbd> 새 대화 · <kbd>⌘B</kbd> 사이드바
      </div>

  <!-- ═══════ Settings drawer ═══════ -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h2 class="drawer-title">설정</h2>
      <button class="icon-btn" id="closeDrawer" aria-label="설정 닫기">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

    <div class="setting-group">
      <div class="setting-label">외관</div>

      <div>slm-factory RAG</div>
      <div>문서 기반 Q&amp;A · 문서 출처 포함</div>
    </div>
  </aside>

  <div class="toast" id="toast"></div>
</div>

<script>
(function() {
'use strict';

/* ═══════════════════════════════════════════════════════════════
   Const / DOM
   ═══════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'slm-factory-chats';
const SETTINGS_KEY = 'slm-factory-settings';
const DEFAULT_MODEL = 'slm-factory-auto';

/* ═════ Status phase helper ═════ */
function setStatusPhase(text) {
  if (!statusPhase) return;
  if (!text) {
    statusPhase.classList.remove('visible');
    statusPhase.textContent = '';
    return;
  }
  statusPhase.textContent = text;
  statusPhase.classList.add('visible');
}

/* ═══════════════════════════════════════════════════════════════
   Persistence
   ═══════════════════════════════════════════════════════════════ */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data.chats)) state.chats = data.chats;
      if (data.currentChatId) state.currentChatId = data.currentChatId;
    }
  } catch (e) { console.warn('failed to load chats', e); }
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) Object.assign(state.settings, JSON.parse(raw));
  } catch (e) { console.warn('failed to load settings', e); }
}

function saveChats() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      chats: state.chats,
      currentChatId: state.currentChatId,
    }));
  } catch (e) { console.warn('failed to save chats', e); }
}

function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }
  catch (e) { console.warn('failed to save settings', e); }
}

function applyTheme() {
  const t = state.settings.theme;
  document.documentElement.setAttribute('data-theme', t);
  darkToggle.classList.toggle('on', t === 'dark');
  if (hljsTheme) {
    hljsTheme.href = t === 'dark'
      ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css'
      : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css';
  }
  themeIcon.innerHTML = t === 'dark'
    ? '<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
  try { mermaid.initialize({ startOnLoad: false, theme: t === 'dark' ? 'dark' : 'default' }); } catch(e) {}
}

function toggleTheme() {
  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
  saveSettings();
  applyTheme();
}

/* ═══════════════════════════════════════════════════════════════
   Markdown / sanitize helpers
   ═══════════════════════════════════════════════════════════════ */
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: function(code, lang) {
    try {
      if (lang === 'mermaid') return code;
      if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      if (typeof hljs !== 'undefined') return hljs.highlightAuto(code).value;
    } catch(e) {}
    return code;
  },
});

function sanitize(html) {
  if (typeof DOMPurify === 'undefined') return html;
  return DOMPurify.sanitize(html, {
    USE_PROFILES: { html: true },
    FORBID_TAGS: ['style', 'form', 'input', 'textarea', 'select', 'iframe', 'object', 'embed', 'script'],
    FORBID_ATTR: ['style', 'onerror', 'onload', 'onclick', 'onmouseover'],
    ADD_TAGS: ['span'],
    ADD_ATTR: ['class', 'aria-hidden'],
  });
}

function renderMarkdown(text) {
  return sanitize(marked.parse(text || ''));
}

function renderKatex(el) {
  if (typeof katex === 'undefined') return;
  const escapeHtml = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = el.innerHTML;
  html = html.replace(/\$\$([^$]+?)\$\$/g, (m, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }); }
    catch(e) { return escapeHtml(m); }
  });
  html = html.replace(/\$([^$\n]+?)\$/g, (m, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
    catch(e) { return escapeHtml(m); }
  });
  el.innerHTML = sanitize(html);
}

function renderMermaid(el) {
  const found = el.querySelectorAll('code.language-mermaid');
  if (!found.length) return;
  found.forEach((codeEl) => {
    const pre = codeEl.parentElement;
    if (!pre || pre.tagName !== 'PRE' || pre.getAttribute('data-mermaid-done')) return;
    pre.setAttribute('data-mermaid-done', '1');
    const div = document.createElement('div');
    div.className = 'mermaid-container';
    const inner = document.createElement('div');
    inner.className = 'mermaid';
    inner.textContent = codeEl.textContent;
    div.appendChild(inner);
    pre.replaceWith(div);
  });
  try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
}

function enhanceCodeBlocks(root) {
  root.querySelectorAll('pre').forEach((pre) => {
    if (pre.getAttribute('data-enhanced')) return;
    pre.setAttribute('data-enhanced', '1');
    const codeEl = pre.querySelector('code');
    if (!codeEl) return;
    const langClass = Array.from(codeEl.classList).find(c => c.startsWith('language-')) || '';
    const lang = langClass.replace('language-', '') || 'text';
    const header = document.createElement('div');
    header.className = 'code-header';
    const label = document.createElement('span');
    label.textContent = lang;
    const copy = document.createElement('button');
    copy.className = 'code-copy';
    copy.type = 'button';
    copy.textContent = 'Copy';
    copy.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const text = codeEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copy.textContent = '복사됨';
        copy.classList.add('copied');
        setTimeout(() => { copy.textContent = 'Copy'; copy.classList.remove('copied'); }, 1800);
      });
    });
    header.appendChild(label);
    header.appendChild(copy);
    pre.insertBefore(header, pre.firstChild);
  });
}

function createChat() {
  const chat = {
    id: 'chat_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    title: '새 대화',
    model: state.settings.model,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    messages: [],
    sessionId: null,
  };
  state.chats.unshift(chat);
  state.currentChatId = chat.id;
  saveChats();
  return chat;
}

function currentChat() {
  return state.chats.find(c => c.id === state.currentChatId) || null;
}

function ensureChat() {
  let c = currentChat();
  if (!c) c = createChat();
  return c;
}

function deleteChat(id) {
  const idx = state.chats.findIndex(c => c.id === id);
  if (idx < 0) return;
  state.chats.splice(idx, 1);
  if (state.currentChatId === id) {
    state.currentChatId = state.chats[0]?.id || null;
    if (!state.currentChatId) createChat();
  }
  saveChats();
  renderSidebar();
  renderChat();
}

function switchChat(id) {
  if (state.streaming) abortStream();
  state.currentChatId = id;
  saveChats();
  renderSidebar();
  renderChat();
}

function updateChatTitle(chat) {
  if (!chat.messages.length) return;
  if (chat.title !== '새 대화' && chat.title) return;
  const firstUser = chat.messages.find(m => m.role === 'user');
  if (!firstUser) return;
  chat.title = firstUser.content.slice(0, MAX_TITLE_LEN).trim();
  if (firstUser.content.length > MAX_TITLE_LEN) chat.title += '…';
}

/* ═══════════════════════════════════════════════════════════════
   Sidebar rendering
   ═══════════════════════════════════════════════════════════════ */
function formatTimeGroup(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  const oneDay = 86400000;
  if (diff < oneDay && d.getDate() === now.getDate()) return '오늘';
  if (diff < oneDay * 2) return '어제';
  if (diff < oneDay * 7) return '최근 7일';
  if (diff < oneDay * 30) return '최근 30일';
  return '이전';
}

function renderSidebar() {
  const search = chatSearch.value.trim().toLowerCase();
  const chats = state.chats
    .filter(c => !search || c.title.toLowerCase().includes(search))
    .sort((a, b) => b.updatedAt - a.updatedAt);

  chatList.innerHTML = '';
  if (chats.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'chat-empty';
    empty.textContent = search ? '검색 결과가 없습니다' : '아직 대화가 없습니다';
    chatList.appendChild(empty);
    return;
  }

  let lastGroup = '';
  chats.forEach((chat) => {
    const group = formatTimeGroup(chat.updatedAt);
    if (group !== lastGroup) {
      const label = document.createElement('div');
      label.className = 'chat-group-label';
      label.textContent = group;
      chatList.appendChild(label);
      lastGroup = group;
    }
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === state.currentChatId ? ' active' : '');
    item.dataset.id = chat.id;
    item.innerHTML = `
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <span class="chat-item-title"></span>
      <button class="chat-item-delete" title="삭제" aria-label="대화 삭제">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M10 7V5a2 2 0 012-2h0a2 2 0 012 2v2"/></svg>
      </button>
    `;
    item.querySelector('.chat-item-title').textContent = chat.title;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.chat-item-delete')) return;
      switchChat(chat.id);
      if (window.innerWidth <= 768) app.classList.remove('sidebar-open');
    });
    item.querySelector('.chat-item-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`"${chat.title}" 대화를 삭제할까요?`)) deleteChat(chat.id);
    });
    chatList.appendChild(item);
  });
}

function renderChat() {
  messagesInner.innerHTML = '';
  const chat = currentChat();
  if (!chat || chat.messages.length === 0) {
    messagesInner.appendChild(renderEmptyState());
    return;
  }
  chat.messages.forEach((msg) => renderMessage(msg));
  requestAnimationFrame(() => { messagesArea.scrollTop = messagesArea.scrollHeight; });
}

function renderMessage(msg) {
  const el = document.createElement('div');
  el.className = 'message ' + msg.role;
  el.dataset.msgId = msg.id || '';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = msg.role === 'user' ? '나' : 'AI';

  const body = document.createElement('div');
  body.className = 'message-body';

  if (msg.role === 'ai') {
    const header = document.createElement('div');
    header.className = 'message-header';
    const role = document.createElement('span');
    role.className = 'message-role';
    role.textContent = 'Assistant';
    header.appendChild(role);
    if (msg.route) {
      const badge = document.createElement('span');
      badge.className = 'route-badge ' + (msg.route === 'agent' ? 'agent' : 'simple');
      badge.textContent = msg.route === 'agent' ? 'Agent RAG' : 'Simple RAG';
      header.appendChild(badge);
    }
    body.appendChild(header);
  }

  if (msg.role === 'ai' && state.settings.showReasoning && msg.reasoning && msg.reasoning.length) {
    body.appendChild(buildReasoning(msg.reasoning));
  }

  const content = document.createElement('div');
  content.className = 'message-content';
  if (msg.role === 'user') {
    content.textContent = msg.content;
  } else {
    content.innerHTML = renderMarkdown(msg.content);
    renderKatex(content);
    renderMermaid(content);
    enhanceCodeBlocks(content);
  }
  body.appendChild(content);

  if (msg.role === 'ai' && msg.sources && msg.sources.length) {
    body.appendChild(buildSources(msg.sources));
  }

  if (msg.role === 'ai') {
    body.appendChild(buildMessageActions(msg, content));
  }

  el.appendChild(avatar);
  el.appendChild(body);
  messagesInner.appendChild(el);
  return { el, body, content };
}

// thought/action/observation 배열을 opencode 스타일 흐르는 prose로 직렬화.
// thought는 단락, action은 `→ ...`, observation은 `  ...`로 가볍게 구분.
// Action 이벤트의 tool+input을 사람 친화 포맷으로 조합.
// - 단일 query 인자: `search("키워드")`
// - 다중 인자: `tool(k=v, k2=v2)`
// - 인자 없음: `tool`
function formatActionText(content, input) {
  const tool = content || '';
  if (!input || typeof input !== 'object') return tool;
  const keys = Object.keys(input);
  if (keys.length === 0) return tool;
  if (keys.length === 1 && keys[0] === 'query') {
    const q = input.query;
    const s = typeof q === 'string' ? q : JSON.stringify(q);
    return `${tool}("${s}")`;
  }
  const parts = keys.map(k => `${k}=${JSON.stringify(input[k])}`);
  return `${tool}(${parts.join(', ')})`;
}

function joinReasoningProse(steps) {
  let out = '';
  steps.forEach((s, i) => {
    const txt = (s.text || '').trim();
    if (!txt) return;
    if (s.type === 'thought') {
      out += (out ? '\n\n' : '') + txt;
    } else if (s.type === 'action') {
      out += (out ? '\n' : '') + '→ ' + txt;
    } else {
      out += (out ? '\n' : '') + '↳ ' + txt;
    }
  });
  return out;
}

function buildReasoning(steps, opts) {
  opts = opts || {};
  const wrap = document.createElement('div');
  wrap.className = 'reasoning' + (opts.live ? ' live' : '');
  const toggle = document.createElement('button');
  toggle.className = 'reasoning-toggle' + (opts.open ? ' open' : '');
  toggle.type = 'button';
  toggle.innerHTML = `
    <b>${opts.live ? '추론 중' : '추론 과정'}</b>
    <svg class="chev" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  `;
  const bodyEl = document.createElement('div');
  bodyEl.className = 'reasoning-body' + (opts.open ? ' open' : '');
  if (steps.length) {
    const proseEl = document.createElement('div');
    proseEl.className = 'reasoning-prose';
    proseEl.textContent = joinReasoningProse(steps);
    bodyEl.appendChild(proseEl);
  }
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    bodyEl.classList.toggle('open');
  });
  wrap.appendChild(toggle);
  wrap.appendChild(bodyEl);
  return wrap;
}

// 스트리밍 중 reasoning 패널을 body에 삽입(또는 이미 있으면 재사용).
// 항상 펼쳐진(open) 상태이며 live 효과(테두리 글로우 + 상단 stripe 애니메이션) 적용.
function ensureReasoningPanel(body, beforeEl) {
  let el = body.querySelector('.reasoning');
  if (el) {
    return { el, body: el.querySelector('.reasoning-body') };
  }
  el = buildReasoning([], { live: true, open: true });
  if (beforeEl && beforeEl.parentNode === body) {
    body.insertBefore(el, beforeEl);
  } else {
    body.appendChild(el);
  }
  return { el, body: el.querySelector('.reasoning-body') };
}

// 첫 token이 도착한 시점에 reasoning 패널의 "진행 중" 효과만 끄고,
// 마지막 단계를 읽을 수 있도록 패널은 계속 열어 둡니다.
// (최종 rerender 시 자동 접힘 — finally 블록에서 처리)
function finalizeReasoning(el) {
  if (!el) return;
  flushTypewriters();
  el.classList.remove('live');
  const label = el.querySelector('.reasoning-toggle b');
  if (label) label.textContent = '추론 완료';
}

// ─── Typewriter: thought/action/observation 텍스트를 한 글자씩 스트리밍 ───
// backend는 thought를 완성된 문자열로 emit하지만, 시각적으로 토큰처럼 흐르게 합니다.
const activeTypewriters = new Set();
function typewriterTo(el, text, charsPerFrame) {
  charsPerFrame = charsPerFrame || 3;
  const entry = { el, text, i: 0, cancelled: false };
  activeTypewriters.add(entry);
  el.textContent = '';
  function tick() {
    if (entry.cancelled) {
      el.textContent = text;
      activeTypewriters.delete(entry);
      return;
    }
    if (entry.i >= text.length) {
      activeTypewriters.delete(entry);
      return;
    }
    entry.i = Math.min(entry.i + charsPerFrame, text.length);
    el.textContent = text.slice(0, entry.i);
    const body = el.closest('.reasoning-body');
    if (body) body.scrollTop = body.scrollHeight;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  return entry;
}
function flushTypewriters() {
  for (const entry of Array.from(activeTypewriters)) {
    entry.cancelled = true;
  }
  activeTypewriters.clear();
  for (const el of Array.from(activeProseEls)) {
    flushProse(el);
  }
}

// 단일 prose element에 텍스트를 append-only로 흘려넣는 글로벌 큐.
// step 사이 끊김 없이 연속 스트리밍 — opencode TUI 추론 표시와 동일한 흐름.
const proseQueues = new WeakMap();
const activeProseEls = new Set();
function streamProse(el, addText, charsPerFrame) {
  charsPerFrame = charsPerFrame || 4;
  let q = proseQueues.get(el);
  if (!q) {
    q = { text: '', i: 0, charsPerFrame, running: false };
    proseQueues.set(el, q);
    activeProseEls.add(el);
    el.textContent = '';
  }
  q.text += addText;
  if (q.running) return;
  q.running = true;
  function tick() {
    if (q.i >= q.text.length) {
      q.running = false;
      return;
    }
    q.i = Math.min(q.i + q.charsPerFrame, q.text.length);
    el.textContent = q.text.slice(0, q.i);
    const body = el.closest('.reasoning-body');
    if (body) body.scrollTop = body.scrollHeight;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function flushProse(el) {
  const q = proseQueues.get(el);
  if (!q) return;
  q.i = q.text.length;
  el.textContent = q.text;
  q.running = false;
  activeProseEls.delete(el);
}

// 버퍼링된 최종 답변(markdown)을 DOM에 점진 렌더 — Agent 모드에서 마지막 사이클만 보여주기 위함.
// 매 프레임 N chars씩 붙여가며 markdown을 재파싱. 호출자가 반환된 Promise를 await하면 완료까지 대기.
function streamMarkdownTo(el, text, charsPerFrame) {
  charsPerFrame = charsPerFrame || 12;
  return new Promise((resolve) => {
    let i = 0;
    el.innerHTML = '';
    function tick() {
      if (i >= text.length) {
        el.innerHTML = renderMarkdown(text);
        renderKatex(el);
        renderMermaid(el);
        enhanceCodeBlocks(el);
        resolve();
        return;
      }
      i = Math.min(i + charsPerFrame, text.length);
      el.innerHTML = renderMarkdown(text.slice(0, i));
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

async function loadModels() {
  try {
    const res = await fetch('/v1/models');
    if (!res.ok) return;
    const data = await res.json();
    if (!Array.isArray(data.data)) return;
    // 서버가 반환한 모델에만 설명 매핑
    state.models = data.data.map((m) => {
      const fallback = { name: m.id, description: m.description || '' };
      const known = {
        'slm-factory-auto': { name: 'Auto', description: 'Simple ↔ Agent 자동 라우팅' },
        'slm-factory-rag': { name: 'Simple RAG', description: '단일 검색 기반 답변' },
        'slm-factory-agent': { name: 'Agent RAG', description: '다단계 추론 에이전트' },
      };
      return { id: m.id, ...(known[m.id] || fallback) };
    });
    renderModelMenu();
  } catch (e) { /* endpoint 없어도 기본값으로 동작 */ }
}

function setStreaming(on) {
  state.streaming = on;
  sendBtn.classList.toggle('stop', on);
  sendIcon.classList.toggle('hidden', on);
  stopIcon.classList.toggle('hidden', !on);
  sendBtn.setAttribute('aria-label', on ? '생성 중단' : '전송');
  sendBtn.disabled = false;
  if (on) setStatusPhase('준비 중...');
  else setStatusPhase(null);
}

function abortStream() {
  if (state.abortController) {
    try { state.abortController.abort(); } catch(e) {}
  }
}

async function handleSend() {
  if (state.streaming) { abortStream(); return; }
  const query = inputField.value.trim();
  if (!query) return;

  const chat = ensureChat();
  const userMsg = { id: 'm_' + Date.now().toString(36), role: 'user', content: query, ts: Date.now() };
  chat.messages.push(userMsg);
  chat.updatedAt = Date.now();
  updateChatTitle(chat);
  saveChats();
  renderSidebar();

  // UI: 빈 상태였다면 초기화, 유저 메시지 추가
  const emptyEl = messagesInner.querySelector('.empty-state');
  if (emptyEl) messagesInner.innerHTML = '';
  renderMessage(userMsg);
  scrollToBottom();

  inputField.value = '';
  autoResizeInput();

  await runStream(chat, query);
}

async function regenerateFrom(aiMsg) {
  const chat = currentChat();
  if (!chat) return;
  const idx = chat.messages.findIndex(m => m.id === aiMsg.id);
  if (idx < 0) return;
  // 직전 user 메시지를 다시 쿼리로 사용
  const priorUser = [...chat.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
  if (!priorUser) return;
  chat.messages.splice(idx, 1);
  saveChats();
  renderChat();
  await runStream(chat, priorUser.content);
}

async function runStream(chat, query) {
  setStreaming(true);

  // AI placeholder 메시지 생성
  const aiMsg = {
    id: 'm_' + Date.now().toString(36) + 'a',
    role: 'ai',
    content: '',
    sources: [],
    reasoning: [],
    route: null,
    ts: Date.now(),
  };
  chat.messages.push(aiMsg);

  // 빈 placeholder를 렌더
  const placeholder = document.createElement('div');
  placeholder.className = 'message ai';
  placeholder.dataset.msgId = aiMsg.id;
  placeholder.innerHTML = `
    <div class="avatar">AI</div>
    <div class="message-body">
      <div class="message-header"><span class="message-role">Assistant</span></div>
      <div class="thinking"><span class="thinking-dots"><span></span><span></span><span></span></span><span>준비 중...</span></div>
    </div>
  `;
  messagesInner.appendChild(placeholder);
  scrollToBottom();

  const body = placeholder.querySelector('.message-body');
  const header = placeholder.querySelector('.message-header');
  const thinking = placeholder.querySelector('.thinking');

  let contentEl = null;
  let reasoningEl = null;
  let reasoningBody = null;
  let routeBadgeEl = null;
  let renderTimer = null;
  // token이 한 번이라도 스트리밍 됐으면 true. 이후 thought/action/observation가 오면
  // 재시도(Reflector/Review-Work) 사이클로 판단 → 부드럽게 fade 후 contentEl 초기화.
  let hasStartedAnswer = false;
  const model = state.settings.model;

  state.abortController = new AbortController();

  try {
    const res = await fetch('/auto', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, session_id: chat.sessionId || null }),
      signal: state.abortController.signal,
    });
    if (!res.ok) throw new Error('서버 오류 (' + res.status + ')');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }

        if (evt.type === 'token') {
          if (thinking && thinking.parentNode) thinking.remove();

          // 이 답변 사이클의 첫 token — reasoning 패널 finalize + status phase 전환.
          if (!hasStartedAnswer) {
            hasStartedAnswer = true;
            if (reasoningEl) finalizeReasoning(reasoningEl);
            setStatusPhase('답변 생성 중...');
          }
          if (!contentEl) {
            contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            body.appendChild(contentEl);
          }
          aiMsg.content += evt.content;
          if (!renderTimer) {
            renderTimer = requestAnimationFrame(() => {
              contentEl.innerHTML = renderMarkdown(aiMsg.content);
              renderKatex(contentEl);
              let tail = contentEl;
              while (tail.lastElementChild) {
                const c = tail.lastElementChild;
                if (c.tagName === 'PRE' || c.tagName === 'TABLE') break;
                tail = c;
              }
              const cur = document.createElement('span');
              cur.className = 'typing-cursor';
              tail.appendChild(cur);
              scrollToBottom();
              renderTimer = null;
            });
          }
        } else if (evt.type === 'route') {
          aiMsg.route = evt.mode;
          if (!routeBadgeEl) {
            routeBadgeEl = document.createElement('span');
            routeBadgeEl.className = 'route-badge ' + (evt.mode === 'agent' ? 'agent' : 'simple');
            routeBadgeEl.textContent = evt.mode === 'agent' ? 'agent' : 'simple';
            header.appendChild(routeBadgeEl);
          } else {
            routeBadgeEl.className = 'route-badge ' + (evt.mode === 'agent' ? 'agent' : 'simple');
            routeBadgeEl.textContent = evt.mode === 'agent' ? 'agent' : 'simple';
          }
          setStatusPhase(evt.mode === 'agent' ? '추론 중...' : '검색 중...');
          // Agent 라우트일 때만 reasoning 패널 미리 띄움 (대기 중이라도 시각적 피드백)
          if (evt.mode === 'agent' && state.settings.showReasoning && !reasoningEl) {
            const built = ensureReasoningPanel(body, contentEl || thinking);
            reasoningEl = built.el;
            reasoningBody = built.body;
            // "준비 중..." placeholder 제거 — 추론 패널이 단독 상태 표시기 역할.
            if (thinking && thinking.parentNode) thinking.remove();
          }
        } else if (evt.type === 'sources') {
          aiMsg.sources = evt.sources || [];
        } else if (evt.type === 'thought' || evt.type === 'action' || evt.type === 'observation') {
          // 재시도 감지 — 이미 답변이 스트리밍 중인데 reasoning이 다시 옴.
          // 부드럽게 fade 후 contentEl 내부를 비우고 reasoning 패널을 live로 복귀.
          if (hasStartedAnswer) {
            hasStartedAnswer = false;
            if (renderTimer) { cancelAnimationFrame(renderTimer); renderTimer = null; }
            aiMsg.content = '';
            if (contentEl) {
              contentEl.classList.add('retrying');
              setTimeout(() => {
                if (contentEl && !hasStartedAnswer) {
                  contentEl.innerHTML = '';
                  contentEl.classList.remove('retrying');
                }
              }, 220);
            }
            if (reasoningEl) {
              reasoningEl.classList.add('live');
              const lbl = reasoningEl.querySelector('.reasoning-toggle b');
              if (lbl) lbl.textContent = '추론 중';
            }
          }
          // action 이벤트는 `tool("query")` 형태로 사람 친화 포맷.
          // thought/observation은 content만 노출 (원시 JSON 누출 방지).
          const text = evt.type === 'action'
            ? formatActionText(evt.content, evt.input)
            : (evt.content || '');
          aiMsg.reasoning.push({ type: evt.type, text });
          if (state.settings.showReasoning) {
            if (!reasoningEl) {
              const built = ensureReasoningPanel(body, contentEl || thinking);
              reasoningEl = built.el;
              reasoningBody = built.body;
              // "준비 중..." placeholder 제거 — 중복 인디케이터 방지.
              if (thinking && thinking.parentNode) thinking.remove();
            }
            // 단일 prose element에 append-only로 흘려넣음 (opencode 스타일).
            let proseEl = reasoningBody.querySelector('.reasoning-prose');
            if (!proseEl) {
              proseEl = document.createElement('div');
              proseEl.className = 'reasoning-prose';
              reasoningBody.appendChild(proseEl);
            }
            const isFirst = aiMsg.reasoning.length === 1;
            let chunk;
            if (evt.type === 'thought') {
              chunk = (isFirst ? '' : '\n\n') + text;
            } else if (evt.type === 'action') {
              chunk = (isFirst ? '' : '\n') + '→ ' + text;
            } else {
              chunk = (isFirst ? '' : '\n') + '↳ ' + text;
            }
            streamProse(proseEl, chunk, 4);
            // 상단바 status phase 갱신
            setStatusPhase(evt.type === 'action' ? 'Searching...' : '추론 중...');
            scrollToBottom();
          }
        } else if (evt.type === 'done') {
          if (evt.session_id) chat.sessionId = evt.session_id;
        }
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      aiMsg.content = (aiMsg.content || '') + '\n\n_(생성이 중단되었습니다)_';
    } else {
      aiMsg.content = '오류가 발생했습니다: ' + (err.message || err);
      showToast('요청 처리 실패', 'error');
    }
  } finally {
    // placeholder 교체 — 최종 렌더
    placeholder.remove();
    // Buffer 모드였다면 reasoning은 아직 live 상태. 먼저 완료 처리.
    // (직접 스트리밍 모드에서는 첫 token 시점에 이미 finalize됨)

    const el = document.createElement('div');
    el.className = 'message ai';
    el.dataset.msgId = aiMsg.id;
    const av = document.createElement('div');
    av.className = 'avatar';
    const bd = document.createElement('div');
    bd.className = 'message-body';
    const hd = document.createElement('div');
    hd.className = 'message-header';
    const role = document.createElement('span');
    role.className = 'message-role';
    role.textContent = 'Assistant';
    hd.appendChild(role);
    if (aiMsg.route) {
      const b = document.createElement('span');
      b.className = 'route-badge ' + (aiMsg.route === 'agent' ? 'agent' : 'simple');
      b.textContent = aiMsg.route === 'agent' ? 'agent' : 'simple';
      hd.appendChild(b);
    }
    bd.appendChild(hd);
    // 스트리밍이 끝났으니 live 효과는 끄고, 기본 접힌 상태로.
    let reasoningFinal = null;
    if (state.settings.showReasoning && aiMsg.reasoning && aiMsg.reasoning.length) {
      reasoningFinal = buildReasoning(aiMsg.reasoning, { live: false, open: false });
      bd.appendChild(reasoningFinal);
    }
    const cEl = document.createElement('div');
    cEl.className = 'message-content';
    bd.appendChild(cEl);
    if (aiMsg.sources && aiMsg.sources.length) {
      bd.appendChild(buildSources(aiMsg.sources));
    }
    bd.appendChild(buildMessageActions(aiMsg, cEl));
    el.appendChild(av);
    el.appendChild(bd);
    messagesInner.appendChild(el);

    chat.updatedAt = Date.now();
    saveChats();
    renderSidebar();
    state.abortController = null;

    // 최종 답변 렌더 — 이미 스트리밍으로 쌓인 aiMsg.content를 즉시 마크다운 렌더.
    const finalText = aiMsg.content || '_답변을 생성하지 못했습니다._';
    cEl.innerHTML = renderMarkdown(finalText);
    renderKatex(cEl);
    renderMermaid(cEl);
    enhanceCodeBlocks(cEl);
    setStreaming(false);
    setStatusPhase(null);
    scrollToBottom();
    inputField.focus();
  }
}

// 키보드 단축키
document.addEventListener('keydown', (e) => {
  const isMac = navigator.platform.toLowerCase().includes('mac');
  const mod = isMac ? e.metaKey : e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    if (state.streaming) abortStream();
    createChat();
    renderSidebar();
    renderChat();
    inputField.focus();
  } else if (mod && e.key.toLowerCase() === 'b') {
    e.preventDefault();
    if (window.innerWidth <= 768) app.classList.toggle('sidebar-open');
    else app.classList.toggle('sidebar-collapsed');
  } else if (e.key === 'Escape') {
    if (state.streaming) { abortStream(); }
    else if (drawer.classList.contains('open')) { closeDrawerFn(); }
    else if (modelMenu.classList.contains('open')) {
      modelMenu.classList.remove('open');
      modelSelectBtn.classList.remove('open');
    }
  }
});

/* ═══════════════════════════════════════════════════════════════
   Boot
   ═══════════════════════════════════════════════════════════════ */
function boot() {
  loadState();
  applyTheme();
  reasoningToggle.classList.toggle('on', state.settings.showReasoning);

  if (state.chats.length === 0) createChat();
  updateModelLabel();
  renderModelMenu();
  renderSidebar();
  renderChat();

  checkHealth();
  setInterval(checkHealth, 30000);
  loadModels();

  inputField.focus();
}

boot();

})();
</script>
</body>
