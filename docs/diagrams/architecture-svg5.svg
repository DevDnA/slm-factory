<?xml version="1.0" encoding="UTF-8"?>
<svg role="img" aria-labelledby="svg5-title svg5-desc" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg">
            <title id="svg5-title">설정 로드 프로세스 다이어그램</title>
            <desc id="svg5-desc">CLI에서 --config 옵션으로 시작하여 _find_config 자동 탐색, load_config 함수의 4단계 처리(절대 경로 변환, YAML 파싱, Pydantic 검증, 경로 변환)를 거쳐 SLMConfig 객체를 반환하는 흐름을 보여주는 다이어그램</desc>
            <defs>
              <marker id="s5-arrow" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polyline points="0 0, 5 2, 0 4" fill="none" stroke="#2C5282" stroke-width="1" stroke-linejoin="round"/></marker>
            </defs>
            <style>
              .s5-title { font: 700 13px Pretendard, sans-serif; fill: #FFFFFF; }
              .s5-label { font: 600 12px "JetBrains Mono", monospace; fill: #1A202C; }
              .s5-note { font: 400 11px Pretendard, sans-serif; fill: #4A5568; }
              .s5-step { font: 500 11px "JetBrains Mono", monospace; fill: #1A202C; }
              .s5-num { font: 700 11px Pretendard, sans-serif; fill: #3182CE; }
              .s5-out { font: 700 13px Pretendard, sans-serif; fill: #2F855A; }
            </style>

            <!-- CLI --config -->
            <rect x="220" y="12" width="280" height="40" rx="6" fill="#1B3A5C"/>
            <text x="360" y="37" text-anchor="middle" class="s5-title">CLI --config project.yaml</text>

            <line x1="360" y1="52" x2="360" y2="72" stroke="#2C5282" stroke-width="2" marker-end="url(#s5-arrow)"/>

            <!-- _find_config() -->
            <rect x="180" y="78" width="360" height="44" rx="8" fill="#EBF8FF" stroke="#2C5282" stroke-width="2"/>
            <text x="200" y="98" class="s5-label">_find_config()</text>
            <text x="200" y="114" class="s5-note">현재 디렉토리 → 상위 디렉토리 순회 (자동 탐색 시)</text>

            <line x1="360" y1="122" x2="360" y2="142" stroke="#2C5282" stroke-width="2" marker-end="url(#s5-arrow)"/>

            <!-- load_config() large box -->
            <rect x="80" y="148" width="560" height="170" rx="8" fill="#EBF8FF" stroke="#2C5282" stroke-width="2"/>
            <text x="100" y="170" class="s5-label">load_config(path)</text>

            <text x="110" y="195" class="s5-num">1.</text>
            <text x="130" y="195" class="s5-step">Path(path).resolve()</text>
            <text x="360" y="195" class="s5-note">-- 절대 경로 변환</text>

            <text x="110" y="220" class="s5-num">2.</text>
            <text x="130" y="220" class="s5-step">yaml.safe_load()</text>
            <text x="360" y="220" class="s5-note">-- YAML 파싱</text>

            <text x="110" y="245" class="s5-num">3.</text>
            <text x="130" y="245" class="s5-step">SLMConfig.model_validate(raw)</text>
            <text x="360" y="245" class="s5-note">-- Pydantic 검증</text>

            <text x="150" y="265" class="s5-step" style="fill:#4A5568">└ _strip_none_sections()</text>
            <text x="360" y="265" class="s5-note">-- None 키 제거 (기본값 적용)</text>

            <text x="110" y="290" class="s5-num">4.</text>
            <text x="130" y="290" class="s5-step">상대 경로 → 절대 경로 변환</text>
            <text x="360" y="290" class="s5-note">-- paths.documents, paths.output</text>

            <line x1="360" y1="318" x2="360" y2="345" stroke="#2C5282" stroke-width="2" marker-end="url(#s5-arrow)"/>

            <!-- SLMConfig output -->
            <rect x="220" y="350" width="280" height="36" rx="6" fill="#F0FFF4" stroke="#2F855A" stroke-width="1"/>
            <text x="360" y="373" text-anchor="middle" class="s5-out">SLMConfig 객체 반환</text>
          </svg>