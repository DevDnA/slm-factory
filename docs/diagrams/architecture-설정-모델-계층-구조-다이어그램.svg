<?xml version="1.0" encoding="UTF-8"?>
<svg role="img" aria-labelledby="svg4-title svg4-desc" viewbox="0 0 780 500" xmlns="http://www.w3.org/2000/svg">
            <title id="svg4-title">설정 모델 계층 구조 다이어그램</title>
            <desc id="svg4-desc">SLMConfig 루트 모델에서 29개 하위 설정 모델(ProjectConfig, PathsConfig, ParsingConfig 등)로 이어지는 계층 구조를 Core, Pipeline, Advanced 세 그룹으로 나누어 보여주는 다이어그램</desc>
            <defs>
              <marker id="s4-arrow" markerwidth="5" markerheight="4" refx="5" refy="2" orient="auto"><polyline points="0 0, 5 2, 0 4" fill="none" stroke="#2C5282" stroke-width="1" stroke-linejoin="round"></polyline></marker>
            </defs>
            <style>
              .s4-root { font: 700 15px Pretendard, sans-serif; fill: #FFFFFF; }
              .s4-group { font: 700 12px Pretendard, sans-serif; fill: #1B3A5C; }
              .s4-item { font: 500 11px "JetBrains Mono", monospace; fill: #1A202C; }
              .s4-nested { font: 400 10px "JetBrains Mono", monospace; fill: #4A5568; }
            </style>

            
            <rect x="265" y="12" width="250" height="40" rx="6" fill="#1B3A5C"></rect>
            <text x="390" y="38" text-anchor="middle" class="s4-root">SLMConfig (root)</text>

            
            <line x1="390" y1="52" x2="390" y2="68" stroke="#2C5282" stroke-width="2"></line>
            <line x1="130" y1="68" x2="650" y2="68" stroke="#2C5282" stroke-width="2"></line>
            <line x1="130" y1="68" x2="130" y2="82" stroke="#2C5282" stroke-width="2"></line>
            <line x1="390" y1="68" x2="390" y2="82" stroke="#2C5282" stroke-width="2"></line>
            <line x1="650" y1="68" x2="650" y2="82" stroke="#2C5282" stroke-width="2"></line>

            
            <text x="130" y="96" text-anchor="middle" class="s4-group">Core</text>
            <rect x="30" y="108" width="200" height="26" rx="4" fill="#EBF8FF" stroke="#2C5282" stroke-width="1"></rect>
            <text x="40" y="126" class="s4-item">project: ProjectConfig</text>
            <rect x="30" y="140" width="200" height="26" rx="4" fill="#EBF8FF" stroke="#2C5282" stroke-width="1"></rect>
            <text x="40" y="158" class="s4-item">paths: PathsConfig</text>
            <rect x="30" y="172" width="200" height="26" rx="4" fill="#EBF8FF" stroke="#2C5282" stroke-width="1"></rect>
